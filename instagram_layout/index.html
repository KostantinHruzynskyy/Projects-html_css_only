<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoSocial</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <h1 class="logo">PhotoSocial</h1>

        <nav>
            <a href="#"><i class="fas fa-house"></i> Home</a>
            <a href="#"><i class="fas fa-magnifying-glass"></i> Cerca</a>
            <a href="#"><i class="fas fa-compass"></i> Esplora</a>
            <a href="#"><i class="fas fa-video"></i> Reels</a>
            <a href="#"><i class="fas fa-heart"></i> Notifiche</a>
            <a href="#"><i class="fas fa-user"></i> Profilo</a>
        </nav>
    </aside>

    <main>

        <div class="stories">

            <div class="story">
                <img src="https://picsum.photos/80?1">
                <span>Luca</span>
            </div>

            <div class="story">
                <img src="https://picsum.photos/80?2">
                <span>Anna</span>
            </div>

            <div class="story">
                <img src="https://picsum.photos/80?3">
                <span>Marco</span>
            </div>

            <div class="story">
                <img src="https://picsum.photos/80?4">
                <span>Sara</span>
            </div>

        </div>

        <article class="post">

            <div class="post-header">
                <img src="https://picsum.photos/50">
                <h3>luca_photo</h3>
            </div>

            <img class="post-image"
                 src="https://picsum.photos/800/500">

            <div class="actions">
                <i class="far fa-heart"></i>
                <i class="far fa-comment"></i>
                <i class="far fa-paper-plane"></i>
            </div>

            <p><strong>1.245 Mi piace</strong></p>

            <p>
                <strong>luca_photo</strong>
                Tramonto sul mare 🌅
            </p>

        </article>

    </main>

</div>

</body>
</html>
