<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Title</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="iphone-page">
      <section class="iphone">
        <div class="dynamic-island"></div>

        <div class="phone-screen">
          <div class="status-bar">
            <span>10.10</span>
            <div>
              <i class="fa-solid fa-signal"></i>
              <i class="fa-solid fa-wifi"></i>
              <i class="fa-solid fa-battery-full"></i>
            </div>
          </div>

          <div class="app-header">
            <div>
              <p>P</p>
              <h1>h1</h1>
            </div>

            <button class="sound-btn" type="button">
              <i class="fa-solid fa-bell d-none" id="soundOn"></i>
              <i class="fa-solid fa-bell-slash" id="soundOff"></i>
            </button>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text">
              <i class="fa-solid fa-user"></i>
            </span>
            <input id="nameInput" class="form-control" type="text" placeholder="Nome contatto">
          </div>
<div class="input-group mb-3">
            <span class="input-group-text">
              <i class="fa-solid fa-mobile-screen-button"></i>
            </span>
            <input id="numberInput" class="form-control" type="number" placeholder="Numero cellulare">
          </div>

          <div class="button-grid">
            <button id="addContactBtn" class="btnPhone" type="button">Aggiungi</button>
            <button id="removeContactBtn" class="btnPhone" type="button">Rimuovi</button>
            <button id="searchContactBtn" class="btnPhone" type="button">Cerca</button>
            <button id="showContactsBtn" class="btnPhone btnShow" type="button">Mostra</button>
          </div>

          <div class="contacts-title">
            <h2>contact List</h2>
            <i class="fa-solid fa-address-book"></i>
          </div>

          <div class="contacts-list" id="wrapperCards"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
